<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#5b36ff"/>
  <!-- Head -->
  <ellipse cx="16" cy="14" rx="9" ry="9" fill="#fff"/>
  <!-- Ear tufts -->
  <polygon points="9,8 11,4 13,8" fill="#e8e0ff"/>
  <polygon points="19,8 21,4 23,8" fill="#e8e0ff"/>
  <!-- Eyes -->
  <circle cx="13" cy="13" r="3.5" fill="#1a0066"/>
  <circle cx="19" cy="13" r="3.5" fill="#1a0066"/>
  <circle cx="12" cy="12" r="1.2" fill="#fff"/>
  <circle cx="18" cy="12" r="1.2" fill="#fff"/>
  <!-- Beak -->
  <polygon points="16,16 14,19 18,19" fill="#ffb800"/>
  <!-- Cap -->
  <rect x="8" y="7" width="16" height="3" rx="1" fill="#1a0066"/>
  <!-- Body -->
  <ellipse cx="16" cy="25" rx="7" ry="6" fill="#fff"/>
  <!-- Belly -->
  <ellipse cx="16" cy="26" rx="4" ry="4" fill="#fff8e8"/>
  <!-- K badge -->
  <circle cx="22" cy="23" r="4" fill="#ffe36c"/>
  <text x="22" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="5.5" fill="#5b36ff">K</text>
</svg>
