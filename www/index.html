<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/images/kidora-icons/favicon-32px.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/kidora-icons/favicon-180px.png">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JB2B3XPD89"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-JB2B3XPD89');
    </script>

    <title>🦉 Kidora</title>

    <meta name="theme-color" content="#5b36ff">

    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div id="home" class="screen"></div>

        <div id="subjects" class="screen"></div>

        <div id="category" class="screen"></div>

        <div id="game" class="screen">

            <div class="score-board">
                <button class="homeBtn" onclick="goBackToCategory()">← Back</button>

                <div class="score-chip">
                    <span class="chip-label">⭐ Score</span>
                    <span class="chip-value" id="score">0</span>
                </div>

                <div class="level-chip">
                    <span class="chip-label">🧠 Level</span>
                    <span class="chip-value" id="level">1</span>
                </div>

                <div class="progress">
                    <span id="progress">0/0</span>
                    <div class="progress-bar">
                        <div id="progressFill"></div>
                    </div>
                </div>

            </div>

            <div id="sd-bar" class="sd-bar" style="display:none">
                ⚡ Lightning Mode &nbsp;|&nbsp; 🔥 Streak: <span id="sd-streak">0</span>
            </div>

            <div class="visual" id="visual"></div>

            <div class="question" id="question"></div>

            <div class="options" id="options"></div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
