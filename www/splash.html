<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidora</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: #5b36ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
  }

  /* floating background bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    animation: floatUp 6s ease-in-out infinite;
  }
  .b1{width:120px;height:120px;left:5%;top:70%;animation-delay:0s;}
  .b2{width:80px;height:80px;left:80%;top:60%;animation-delay:1s;}
  .b3{width:200px;height:200px;left:-5%;top:-10%;animation-delay:2s;}
  .b4{width:60px;height:60px;left:85%;top:10%;animation-delay:0.5s;}
  .b5{width:100px;height:100px;left:50%;top:80%;animation-delay:1.5s;}
  .b6{width:40px;height:40px;left:20%;top:15%;animation-delay:3s;}

  @keyframes floatUp {
    0%,100% { transform: translateY(0) scale(1); opacity:0.5; }
    50%      { transform: translateY(-30px) scale(1.05); opacity:1; }
  }

  /* star sparkles */
  .spark {
    position: absolute;
    font-size: 1.4rem;
    animation: sparkle 3s ease-in-out infinite;
    opacity: 0;
  }
  .s1{top:15%;left:12%;animation-delay:0s;}
  .s2{top:20%;left:82%;animation-delay:0.8s;}
  .s3{top:72%;left:8%;animation-delay:1.6s;}
  .s4{top:78%;left:78%;animation-delay:2.4s;}
  .s5{top:45%;left:90%;animation-delay:1.2s;}
  .s6{top:8%;left:55%;animation-delay:0.4s;}

  @keyframes sparkle {
    0%,100%{ opacity:0; transform:scale(0.5) rotate(0deg); }
    50%     { opacity:1; transform:scale(1.2) rotate(20deg); }
  }

  /* main icon container */
  .icon-wrap {
    position: relative;
    animation: iconEntry 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0.2s;
  }

  @keyframes iconEntry {
    0%   { transform: scale(0) rotate(-15deg); opacity:0; }
    60%  { transform: scale(1.12) rotate(4deg); opacity:1; }
    80%  { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity:1; }
  }

  .icon-bg {
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.15);
    border-radius: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 8px rgba(255,255,255,0.08),
      0 0 0 16px rgba(255,255,255,0.04),
      0 20px 60px rgba(0,0,0,0.25);
    animation: pulse 3s ease-in-out infinite;
    animation-delay: 1.2s;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 8px rgba(255,255,255,0.08), 0 0 0 16px rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.25); }
    50%      { box-shadow: 0 0 0 14px rgba(255,255,255,0.12), 0 0 0 28px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.25); }
  }

  .icon-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
  }

  /* floating pencil & star around icon */
  .orbit {
    position: absolute;
    font-size: 1.8rem;
    animation: orbit 4s linear infinite;
  }
  .orbit-pencil { animation-delay: 0s; }
  .orbit-star   { animation-delay: 2s; }

  @keyframes orbit {
    0%   { transform: rotate(0deg) translateX(100px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
  }

  /* app name */
  .app-name {
    margin-top: 32px;
    font-size: 3rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    animation: nameEntry 0.7s ease both;
    animation-delay: 0.8s;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  @keyframes nameEntry {
    0%   { opacity:0; transform: translateY(20px); }
    100% { opacity:1; transform: translateY(0); }
  }

  /* tagline */
  .tagline {
    margin-top: 10px;
    font-size: 1rem;
    color: rgba(255,255,255,0.75);
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: nameEntry 0.7s ease both;
    animation-delay: 1s;
  }

  /* loading dots */
  .dots {
    margin-top: 48px;
    display: flex;
    gap: 10px;
    animation: nameEntry 0.5s ease both;
    animation-delay: 1.4s;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2){ animation-delay:0.2s; }
  .dot:nth-child(3){ animation-delay:0.4s; }

  @keyframes dotBounce {
    0%,100%{ transform:translateY(0); background:rgba(255,255,255,0.4); }
    50%    { transform:translateY(-10px); background:rgba(255,255,255,0.9); }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- background bubbles -->
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>
<div class="bubble b5"></div>
<div class="bubble b6"></div>

<!-- sparkle stars -->
<div class="spark s1">⭐</div>
<div class="spark s2">✨</div>
<div class="spark s3">⭐</div>
<div class="spark s4">✨</div>
<div class="spark s5">⭐</div>
<div class="spark s6">✨</div>

<!-- icon with orbiting elements -->
<div class="icon-wrap">
  <div class="orbit orbit-pencil">✏️</div>
  <div class="orbit orbit-star">⭐</div>
  <div class="icon-bg">
    <!-- Replace src with your actual icon path -->
    <img class="icon-img" src="assets/images/icon-playstore-512px.png"
         onerror="this.style.fontSize='5rem';this.style.lineHeight='1';this.innerHTML='🦉';"
         alt="Kidora">
  </div>
</div>

<div class="app-name">Kidora</div>
<div class="tagline">Learn · Play · Grow</div>

<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

</body>
</html>
